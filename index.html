<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookTable - Home</title>
    <link rel="stylesheet" href="home_style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="window.location.href='home.html'">
                <h2>BookTable</h2>
            </div>
            <div class="nav-links">
                <a href="my-bookings.html" class="nav-item">
                    <span class="icon">📅</span> My booking
                </a>
                <a href="profile.html" class="nav-item profile-btn">
                    <span class="icon">👤</span> Account
                </a>
            </div>
        </div>
    </nav>

    <div class="home-container">
        <div class="search-section">
            <input type="text" placeholder="Search for a restaurant or cuisine..." class="search-input">
        </div>

        <div class="categories-section">
            <div class="category-btn active" id="btn-res" onclick="filterItems('restaurant')">
                <span class="icon">🍽️</span> Restaurants
            </div>
            <div class="category-btn" id="btn-cafe" onclick="filterItems('cafe')">
                <span class="icon">☕</span> Cafe
            </div>
        </div>

        <div class="restaurants-list" id="main-list">
            <div class="restaurant-card filter-item restaurant" onclick="window.location.href='meraki.html'" style="cursor: pointer;">
                <div class="image-wrapper">
                    <img src="https://bsf.sa/ContentFiles/11752Image.PNG" alt="Meraki Riyadh" class="restaurant-img">
                </div>
                <div class="info-wrapper">
                    <div class="top-row">
                        <h3>Meraki Riyadh</h3>
                        <span class="rating">4.8</span>
                    </div>
                    <div class="details-row">Greek Fine Dining • Al Faisaliah</div>
                    <div class="status-row">Tables available</div>
                </div>
            </div>

            <div class="restaurant-card filter-item restaurant" onclick="window.location.href='beefbar.html'" style="cursor: pointer;">
                <div class="image-wrapper">
                    <img src="https://www.alrajhibank.com.sa/-/media/Project/Arajhi-Offers/Offers/2024/New-Offers-Section4/web-Banners-logos-99.jpg?h=640&iar=0&w=1920" alt="Beefbar Riyadh" class="restaurant-img">
                </div>
                <div class="info-wrapper">
                    <div class="top-row">
                        <h3>Beefbar Riyadh</h3>
                        <span class="rating">4.9</span>
                    </div>
                    <div class="details-row">Luxury Steakhouse • Sulimaniyah</div>
                    <div class="status-row">Tables available</div>
                </div>
            </div>
            </div>

        <footer class="footer">
            </footer>

    <script src="home.js"></script>
</body>
</html>
