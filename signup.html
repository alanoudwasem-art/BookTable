<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookTable - Create Account</title>
    <link rel="stylesheet" href="signup_style.css">
</head>
<body>
    <div class="signup-container">
        <button class="back-btn" onclick="window.location.href='Start.html'">←</button>

        <h2>Create your account</h2>
        <p class="subtitle">Please enter your details to get started</p>
        
        <div class="field-label">Full Name</div>
        <div class="input-group">
            <input type="text" placeholder="Enter your first and surname" class="full-input">
        </div>

        <div class="field-label">Mobile Number</div>
        <div class="input-group">
            <span class="country-code">🇸🇦 +966</span>
            <input type="tel" id="phoneInput" placeholder="5XXXXXXXX" class="phone-input">
        </div>

        <div class="field-label">Email Address</div>
        <div class="input-group">
            <input type="email" placeholder="name@example.com" class="full-input">
        </div>

        <div class="field-label">Password</div>
        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="At least 8 characters" class="full-input">
        </div>

        <button id="continueBtn" class="continue-btn-active" onclick="window.location.href='terms.html'">Create Account</button>

        <p class="terms">By proceeding, you consent to our Terms of Service and Privacy Policy.</p>
    </div>
</body>
</html>
