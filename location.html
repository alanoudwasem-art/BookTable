<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookTable - Location Access</title>
    <link rel="stylesheet" href="location_style.css">
</head>
<body>
    <div class="location-container">
        
        <div class="content-wrapper">
            <div class="icon-section">
                <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png" alt="Location Icon" class="location-icon">
            </div>

            <h2>Allow location access</h2>
            <p class="description">
                This lets us show you the finest restaurants and available tables to book near you
            </p>
        </div>

        <div class="footer-buttons">
            <button class="enable-btn" onclick="window.location.href='home.html'">Enable Location</button>
            <button class="maybe-btn" onclick="window.location.href='home.html'">Maybe Later</button>
        </div>

    </div>
</body>
</html>
