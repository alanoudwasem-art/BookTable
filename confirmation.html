<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed</title>
    <link rel="stylesheet" href="conf_style.css">
</head>
<body>

    <div class="conf-container">
        <div class="success-icon">
            <div class="circle">
                <span class="checkmark">✓</span>
            </div>
        </div>

        <div class="conf-text">
            <h1>Booking Confirmed!</h1>
            <p>Your reservation has been successfully placed. We look forward to seeing you!</p>
        </div>

        <div class="reservation-card">
            <h3>Reservation Details</h3>
            <div class="detail-row">
                <span>Status</span>
                <span class="status-tag">Confirmed</span>
            </div>
            <div class="detail-row">
                <span>Booking ID</span>
                <span>#BK8820</span>
            </div>
        </div>

        <button class="home-btn" onclick="window.location.href='home.html'">
            Back to Home
        </button>
    </div>

</body>
</html>
